<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucapan Ulang Tahun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
        }

        .input-card, .birthday-card {
            background: white;
            border-radius: 20px;
            padding: 40px 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-card.hidden {
            display: none;
        }

        .birthday-card.hidden {
            display: none;
        }

        h1 {
            font-size: clamp(2em, 8vw, 3em);
            color: #764ba2;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out infinite;
            word-wrap: break-word;
        }

        h2 {
            font-size: clamp(1.5em, 6vw, 2.2em);
            color: #667eea;
            margin-bottom: 30px;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .emoji-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }

        .emoji-balloon {
            font-size: clamp(2.5em, 6vw, 4em);
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .emoji-balloon:nth-child(1) { animation-delay: 0s; }
        .emoji-balloon:nth-child(2) { animation-delay: 0.5s; }
        .emoji-balloon:nth-child(3) { animation-delay: 1s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .message {
            font-size: clamp(1em, 4vw, 1.3em);
            color: #333;
            line-height: 1.8;
            margin: 30px 0;
            animation: fadeIn 1.5s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
        }

        input[type="text"] {
            width: 100%;
            max-width: 400px;
            padding: clamp(12px, 3vw, 15px) clamp(15px, 4vw, 20px);
            font-size: clamp(1em, 4vw, 1.1em);
            border: 2px solid #667eea;
            border-radius: 10px;
            margin: 20px 0;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: 'Arial', sans-serif;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: clamp(12px 30px, 3vw 6vw, 15px 40px);
            font-size: clamp(0.95em, 4vw, 1.1em);
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            width: 100%;
            max-width: 300px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(-1px);
        }

        .cake {
            font-size: clamp(3em, 10vw, 5em);
            animation: rotate 2s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .name-display {
            font-size: clamp(1.5em, 6vw, 2em);
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Responsive untuk tablet dan desktop */
        @media (min-width: 768px) {
            .input-card, .birthday-card {
                padding: 60px 40px;
            }

            button {
                width: auto;
            }

            input[type="text"] {
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Input Card -->
        <div class="input-card" id="inputCard">
            <div class="cake">🎁</div>
            <h2>Masukan Nama Mu</h2>
            <input 
                type="text" 
                id="nameInput" 
                placeholder="Masukkan nama..." 
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="submitName()">Lanjut 🎉</button>
        </div>

        <!-- Birthday Card -->
        <div class="birthday-card hidden" id="birthdayCard">
            <div class="cake">🎂</div>
            <h1>SELAMAT<br>ULANG TAHUN!</h1>
            
            <div class="name-display" id="nameDisplay"></div>

            <div class="emoji-container">
                <div class="emoji-balloon">🎈</div>
                <div class="emoji-balloon">🎉</div>
                <div class="emoji-balloon">🎊</div>
            </div>

            <p class="message">
                Hari spesialmu telah tiba! 🌟<br><br>
                Semoga hari ini penuh dengan kebahagiaan, tawa, dan momen-momen indah.<br><br>
                Terima kasih telah menjadi teman yang luar biasa!<br><br>
                <strong>Semoga impianmu semua terwujud!</strong>
            </p>

            <button onclick="createConfetti()">🎆 Rayakan! 🎆</button>
            <button onclick="goBack()" style="margin-top: 10px; background: #999;">← Kembali</button>
        </div>
    </div>

    <script>
        function submitName() {
            const nameInput = document.getElementById('nameInput').value.trim();
            
            if (nameInput === '') {
                alert('Silakan masukkan nama terlebih dahulu!');
                return;
            }

            // Tampilkan kartu ulang tahun
            document.getElementById('inputCard').classList.add('hidden');
            document.getElementById('birthdayCard').classList.remove('hidden');
            document.getElementById('nameDisplay').textContent = nameInput;

            // Trigger confetti otomatis
            setTimeout(createConfetti, 500);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitName();
            }
        }

        function goBack() {
            document.getElementById('birthdayCard').classList.add('hidden');
            document.getElementById('inputCard').classList.remove('hidden');
            document.getElementById('nameInput').value = '';
            document.getElementById('nameInput').focus();
        }

        function createConfetti() {
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animation = `fall ${2 + Math.random() * 1}s linear`;
                document.body.appendChild(confetti);

                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }
        }

        // Tambahkan animasi jatuh untuk confetti
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotateZ(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Focus ke input saat halaman dimuat
        window.addEventListener('load', () => {
            document.getElementById('nameInput').focus();
        });
    </script>
</body>
</html>
